<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024"
     role="img" aria-labelledby="title desc">
  <title id="title">Timefold symbol</title>
  <desc id="desc">An interlocking blue and charcoal folded circular ribbon.</desc>

  <defs>
    <linearGradient id="rearDark" x1="208" y1="349" x2="468" y2="724" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#171b23"/>
      <stop offset="0.43" stop-color="#30343d"/>
      <stop offset="1" stop-color="#494d56"/>
    </linearGradient>

    <linearGradient id="innerFold" x1="339" y1="503" x2="555" y2="676" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#777b82"/>
      <stop offset="0.28" stop-color="#b9bbc0"/>
      <stop offset="0.72" stop-color="#f4f4f5"/>
      <stop offset="1" stop-color="#d4d5d9"/>
    </linearGradient>

    <linearGradient id="blueRibbon" x1="292" y1="181" x2="763" y2="597" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#719be0"/>
      <stop offset="0.36" stop-color="#628bd0"/>
      <stop offset="0.72" stop-color="#4f79bd"/>
      <stop offset="1" stop-color="#315b98"/>
    </linearGradient>

    <linearGradient id="blueEnd" x1="753" y1="492" x2="845" y2="568" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#234778"/>
      <stop offset="0.55" stop-color="#315e9d"/>
      <stop offset="1" stop-color="#20416e"/>
    </linearGradient>

    <linearGradient id="frontDark" x1="358" y1="691" x2="754" y2="839" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#434751"/>
      <stop offset="0.5" stop-color="#383c46"/>
      <stop offset="1" stop-color="#292d36"/>
    </linearGradient>

    <linearGradient id="frontSheen" x1="512" y1="599" x2="558" y2="905" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>

    <filter id="softDepth" x="-12%" y="-12%" width="124%" height="124%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.22"/>
    </filter>

    <clipPath id="frontClip">
      <path d="M393 696 C486 687 586 645 698 596 L881 531 C889 528 895 534 895 543 C896 678 823 805 704 867 C599 922 474 916 369 865 C248 806 166 702 151 594 C141 521 157 452 188 405 C170 472 167 549 190 613 C217 688 268 709 326 708 C347 708 369 704 393 696 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#softDepth)">
    <!-- Rear half of the charcoal loop. -->
    <path d="M478 338
             C397 312 311 314 245 346
             C173 381 145 452 149 552
             C151 627 179 699 228 758
             C270 809 329 850 396 877
             L470 721
             C417 706 363 702 337 678
             C305 649 302 603 316 556
             C335 493 374 414 478 338 Z"
          fill="url(#rearDark)" stroke="#d6d7da" stroke-width="1.1" stroke-linejoin="round"/>

    <!-- The light underside revealed by the fold. -->
    <path d="M342 483
             C365 530 404 570 450 603
             C486 629 525 649 565 663
             C505 688 448 701 398 698
             C359 696 337 680 324 654
             C306 618 310 568 327 524
             C331 512 337 496 342 483 Z"
          fill="url(#innerFold)" stroke="#ececef" stroke-width="1.1" stroke-linejoin="round"/>

    <!-- Short blue return edge behind the foreground ribbon. -->
    <path d="M754 526 L845 486 L846 558 L740 603 C744 584 743 564 739 549 C742 540 747 533 754 526 Z"
          fill="url(#blueEnd)" stroke="#6487bd" stroke-width="0.9"/>

    <!-- Upper ribbon. -->
    <path d="M165 447
             C194 349 250 264 331 207
             C414 149 508 126 602 134
             C698 142 781 187 831 261
             C865 311 881 378 884 475
             C885 483 881 489 873 493
             L760 548
             C747 555 742 565 741 582
             C741 564 739 553 734 544
             C683 454 592 376 478 338
             C368 301 266 319 198 376
             C184 388 174 414 165 447 Z"
          fill="url(#blueRibbon)" stroke="#d3dcf0" stroke-width="1.15" stroke-linejoin="round"/>

    <!-- Foreground charcoal ribbon. -->
    <path d="M393 696
             C486 687 586 645 698 596
             L881 531
             C889 528 895 534 895 543
             C896 678 823 805 704 867
             C599 922 474 916 369 865
             C248 806 166 702 151 594
             C141 521 157 452 188 405
             C169 476 168 548 190 613
             C211 677 258 708 326 708
             C347 708 369 704 393 696 Z"
          fill="url(#frontDark)" stroke="#d6d7da" stroke-width="1.15" stroke-linejoin="round"/>

    <rect x="132" y="390" width="778" height="526" fill="url(#frontSheen)" clip-path="url(#frontClip)" pointer-events="none"/>

    <!-- Delicate highlights defining the folded edges. -->
    <path d="M165 447 C194 349 250 264 331 207 C414 149 508 126 602 134 C698 142 781 187 831 261 C865 311 881 378 884 475"
          fill="none" stroke="#ffffff" stroke-opacity="0.48" stroke-width="1" stroke-linecap="round"/>
    <path d="M393 696 C486 687 586 645 698 596 L881 531"
          fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.15" stroke-linecap="round"/>
  </g>
</svg>
