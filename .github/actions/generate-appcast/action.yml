name: "Generate Appcast"
description: "Generate and validate the accumulating feed with Sparkle's official generate_appcast tool"

inputs:
  version:
    description: "Marketing version (X.Y.Z)"
    required: true
  build-number:
    description: "Build number used by Sparkle"
    required: true
  tag:
    description: "Release tag used in the download URL"
    required: true
  notes-file:
    description: "Path to HTML release notes"
    required: true
  sparkle-private-key:
    description: "Sparkle EdDSA private key"
    required: true
  sparkle-version:
    description: "Sparkle tools release"
    required: false
    default: "2.8.1"
  sparkle-sha256:
    description: "SHA-256 digest of the Sparkle distribution archive"
    required: false
    default: "5cddb7695674ef7704268f38eccaee80e3accbf19e61c1689efff5b6116d85be"
  app-name:
    description: "Application and archive base name"
    required: false
    default: "AgentUsage"
  archive-path:
    description: "Path to the signed release archive"
    required: false
    default: "build/AgentUsage.zip"

runs:
  using: "composite"
  steps:
    - name: Generate and validate appcast
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        BUILD: ${{ inputs.build-number }}
        TAG: ${{ inputs.tag }}
        NOTES_HTML: ${{ inputs.notes-file }}
        SPARKLE_PRIVATE_KEY: ${{ inputs.sparkle-private-key }}
        SPARKLE_VERSION: ${{ inputs.sparkle-version }}
        SPARKLE_SHA256: ${{ inputs.sparkle-sha256 }}
        APP_NAME: ${{ inputs.app-name }}
        ARCHIVE_PATH: ${{ inputs.archive-path }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
      run: "$GITHUB_ACTION_PATH/../../scripts/release/generate-appcast.sh"
