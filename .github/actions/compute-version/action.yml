name: "Compute Version"
description: "Compute or resume the next release version and notes from Git history"

inputs:
  bump:
    description: "Version bump type (auto, patch, minor, major)"
    required: false
    default: "auto"

outputs:
  skip:
    description: "true when there is nothing to release"
    value: ${{ steps.compute.outputs.skip }}
  resume:
    description: "true when an untagged version already exists in the version file"
    value: ${{ steps.compute.outputs.resume }}
  version:
    description: "Next marketing version (X.Y.Z)"
    value: ${{ steps.compute.outputs.version }}
  tag:
    description: "Next release tag (vX.Y.Z)"
    value: ${{ steps.compute.outputs.tag }}
  build-number:
    description: "Next CURRENT_PROJECT_VERSION"
    value: ${{ steps.compute.outputs.build_number }}
  last-tag:
    description: "Previous release tag"
    value: ${{ steps.compute.outputs.last_tag }}
  notes:
    description: "Release notes generated from commit subjects"
    value: ${{ steps.compute.outputs.notes }}
  bump:
    description: "Resolved bump type, or resume"
    value: ${{ steps.compute.outputs.bump }}

runs:
  using: "composite"
  steps:
    - name: Compute version and release notes
      id: compute
      shell: bash
      env:
        BUMP_INPUT: ${{ inputs.bump }}
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
      run: "$GITHUB_ACTION_PATH/../../scripts/release/compute-version.sh"
