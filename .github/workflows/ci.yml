name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - ".beads/**"
      - ".claude/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test ClaudeMeterKit package
        run: swift test --package-path ClaudeMeterKit

      - name: Build macOS app
        run: |
          xcodebuild -project ClaudeMeter.xcodeproj \
            -scheme ClaudeMeter \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO

      - name: Test macOS app
        run: |
          xcodebuild -project ClaudeMeter.xcodeproj \
            -scheme ClaudeMeter \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            test \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO

